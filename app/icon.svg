  />

  <!-- Star mark -->
  <path
    d="M32 12.6l2.1 4.3 4.7.7-3.4 3.3.8 4.7-4.2-2.2-4.2 2.2.8-4.7-3.4-3.3 4.7-.7L32 12.6z"
