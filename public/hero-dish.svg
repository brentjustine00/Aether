<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="plate" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 400) rotate(90) scale(320)">
      <stop stop-color="#1B1B1B"/>
      <stop offset="0.55" stop-color="#0F0F0F"/>
      <stop offset="1" stop-color="#070707"/>
    </radialGradient>
    <radialGradient id="rim" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 400) rotate(90) scale(360)">
      <stop stop-color="#D4AF37" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#D4AF37" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldStroke" x1="140" y1="360" x2="660" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#D4AF37" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <circle cx="400" cy="400" r="360" fill="url(#rim)"/>
  <circle cx="400" cy="400" r="330" fill="url(#plate)"/>
  <circle cx="400" cy="400" r="330" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Sauce arc -->
  <path d="M210 420C260 300 360 260 470 290C585 320 610 430 545 520" stroke="url(#goldStroke)" stroke-width="10" stroke-linecap="round"/>
  <path d="M235 440C280 335 370 295 458 320C545 345 565 425 525 490" stroke="#D4AF37" stroke-opacity="0.22" stroke-width="6" stroke-linecap="round"/>

  <!-- Main protein -->
  <g filter="url(#soft)" opacity="0.55">
    <ellipse cx="420" cy="410" rx="110" ry="72" fill="#D4AF37" fill-opacity="0.12"/>
  </g>
  <ellipse cx="420" cy="405" rx="110" ry="72" fill="#141414" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
  <path d="M340 405C370 360 430 345 495 370C520 380 538 402 545 425C520 468 460 490 400 474C365 465 345 444 340 405Z" fill="#0C0C0C"/>

  <!-- Micro herbs -->
  <circle cx="330" cy="360" r="5" fill="#D4AF37" fill-opacity="0.75"/>
  <circle cx="520" cy="470" r="4" fill="#D4AF37" fill-opacity="0.55"/>
  <circle cx="470" cy="335" r="3" fill="#D4AF37" fill-opacity="0.65"/>
  <circle cx="365" cy="485" r="3" fill="#D4AF37" fill-opacity="0.45"/>

  <!-- Steam -->
  <path d="M470 250C450 230 455 205 476 188" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="10" stroke-linecap="round"/>
  <path d="M420 245C400 222 410 202 430 186" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="8" stroke-linecap="round"/>
</svg>

